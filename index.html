<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>의용어 트레이너</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3f;
    --accent: #7c6cfc;
    --accent2: #fc6c8f;
    --accent3: #6cfcca;
    --text: #e8e8f0;
    --text-muted: #6e6e8f;
    --correct: #4ade80;
    --wrong: #f87171;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
    --display: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 배경 노이즈 느낌 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,108,252,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(252,108,143,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── 헤더 ── */
  header {
    padding: 40px 0 32px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: var(--display);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .logo span { color: var(--accent); }

  .stats-bar {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat {
    text-align: right;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .stat strong {
    display: block;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .stat.correct strong { color: var(--correct); }
  .stat.wrong strong { color: var(--wrong); }

  /* ── 모드 탭 ── */
  .mode-tabs {
    display: flex;
    gap: 8px;
    padding: 24px 0 0;
  }

  .tab {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .tab.disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .tab.disabled:hover { border-color: var(--border); color: var(--text-muted); }

  .soon-badge {
    font-size: 9px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 4px;
    vertical-align: middle;
  }

  /* ── 퀴즈 카드 ── */
  .quiz-area {
    padding: 40px 0;
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .progress-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px 40px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
    opacity: 0.6;
  }
  .card.correct-card { border-color: var(--correct); }
  .card.wrong-card { border-color: var(--wrong); }

  .card-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 20px;
    letter-spacing: 0.1em;
  }

  .question-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .question-text {
    font-size: 36px;
    font-weight: 700;
    font-family: var(--display);
    line-height: 1.2;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .question-hint {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 36px;
    font-family: var(--mono);
  }

  /* 입력 */
  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .answer-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 16px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.02em;
  }
  .answer-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,108,252,0.15);
  }
  .answer-input.correct {
    border-color: var(--correct);
    box-shadow: 0 0 0 3px rgba(74,222,128,0.15);
    color: var(--correct);
  }
  .answer-input.wrong {
    border-color: var(--wrong);
    box-shadow: 0 0 0 3px rgba(248,113,113,0.15);
    color: var(--wrong);
  }
  .answer-input::placeholder { color: var(--text-muted); }

  .submit-btn {
    padding: 14px 24px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.05em;
  }
  .submit-btn:hover { background: #6a5ae0; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* 피드백 */
  .feedback {
    margin-top: 20px;
    padding: 14px 18px;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.3s;
    min-height: 48px;
  }
  .feedback.show { opacity: 1; }
  .feedback.correct {
    background: rgba(74,222,128,0.08);
    border: 1px solid rgba(74,222,128,0.3);
    color: var(--correct);
  }
  .feedback.wrong {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--wrong);
  }

  /* 다음 버튼 */
  .next-btn {
    margin-top: 16px;
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 10px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.08em;
    display: none;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── 결과 화면 ── */
  .result-screen {
    display: none;
    padding: 60px 0;
    text-align: center;
  }
  .result-screen.show { display: block; }

  .result-score {
    font-family: var(--display);
    font-size: 80px;
    font-weight: 800;
    letter-spacing: -3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .result-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 48px;
  }

  .result-breakdown {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 48px;
  }
  .breakdown-item {
    text-align: center;
    font-family: var(--mono);
  }
  .breakdown-item .num {
    font-size: 32px;
    font-weight: 600;
    display: block;
    margin-bottom: 4px;
  }
  .breakdown-item .lbl {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .breakdown-item.c .num { color: var(--correct); }
  .breakdown-item.w .num { color: var(--wrong); }

  /* 틀린 단어 목록 */
  .wrong-list {
    text-align: left;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 32px;
  }
  .wrong-list h3 {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .wrong-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    gap: 16px;
  }
  .wrong-item:last-child { border-bottom: none; }
  .wrong-item .korean { color: var(--text-muted); font-size: 13px; }
  .wrong-item .answer { font-family: var(--mono); color: var(--correct); }
  .wrong-item .my-answer { font-family: var(--mono); color: var(--wrong); font-size: 12px; }

  .restart-btn {
    padding: 16px 40px;
    background: linear-gradient(135deg, var(--accent), #5a4ae0);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.2s;
  }
  .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,108,252,0.3); }

  /* ── 설정 패널 ── */
  .config-panel {
    margin-top: 24px;
    padding: 20px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
  }
  .config-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }
  .config-item label { white-space: nowrap; }
  .config-item select, .config-item input[type=number] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
  }
  .config-item select:focus, .config-item input[type=number]:focus {
    border-color: var(--accent);
  }
  .start-btn {
    margin-left: auto;
    padding: 8px 20px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .start-btn:hover { background: #6a5ae0; }

  /* 애니메이션 */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card { animation: slideUp 0.35s ease both; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }
  .shake { animation: shake 0.4s ease; }
</style>
</head>
<body>
<div class="wrap">

  <!-- 헤더 -->
  <header>
    <div class="logo">med<span>.</span>quiz</div>
    <div class="stats-bar">
      <div class="stat correct"><strong id="totalCorrect">0</strong>누적 정답</div>
      <div class="stat wrong"><strong id="totalWrong">0</strong>누적 오답</div>
      <div class="stat"><strong id="totalSessions">0</strong>세션</div>
    </div>
  </header>

  <!-- 모드 탭 -->
  <div class="mode-tabs">
    <button class="tab active" data-mode="typing">타이핑</button>
    <button class="tab disabled" title="준비중">객관식 <span class="soon-badge">SOON</span></button>
    <button class="tab disabled" title="준비중">플래시카드 <span class="soon-badge">SOON</span></button>
    <button class="tab disabled" title="준비중">통계 <span class="soon-badge">SOON</span></button>
  </div>

  <!-- 설정 패널 -->
  <div class="config-panel">
    <div class="config-item">
      <label>문제 수</label>
      <input type="number" id="countInput" value="20" min="5" max="246" style="width:64px">
    </div>
    <div class="config-item">
      <label>순서</label>
      <select id="orderSelect">
        <option value="random">랜덤</option>
        <option value="seq">순서대로</option>
      </select>
    </div>
    <div class="config-item">
      <label>대소문자</label>
      <select id="caseSelect">
        <option value="ignore">무시</option>
        <option value="strict">구분</option>
      </select>
    </div>
    <button class="start-btn" id="startBtn">시작</button>
  </div>

  <!-- 퀴즈 영역 -->
  <div class="quiz-area" id="quizArea" style="display:none">
    <div class="progress-row">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progressLabel">0 / 0</div>
    </div>

    <div class="card" id="quizCard">
      <div class="card-num" id="cardNum">WORD #001</div>
      <div class="question-label">한국어 뜻</div>
      <div class="question-text" id="questionText">—</div>
      <div class="question-hint" id="questionHint"></div>

      <div class="input-row">
        <input
          class="answer-input"
          id="answerInput"
          type="text"
          placeholder="영어 단어 입력..."
          autocomplete="off"
          spellcheck="false"
        >
        <button class="submit-btn" id="submitBtn">확인</button>
      </div>

      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="nextBtn">다음 문제 →</button>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div class="result-screen" id="resultScreen">
    <div class="result-score" id="resultScore">0%</div>
    <div class="result-label">이번 세션 결과</div>
    <div class="result-breakdown">
      <div class="breakdown-item c"><span class="num" id="resCorrect">0</span><span class="lbl">정답</span></div>
      <div class="breakdown-item w"><span class="num" id="resWrong">0</span><span class="lbl">오답</span></div>
      <div class="breakdown-item"><span class="num" id="resTotal">0</span><span class="lbl">전체</span></div>
    </div>
    <div class="wrong-list" id="wrongList" style="display:none">
      <h3>틀린 단어</h3>
      <div id="wrongItems"></div>
    </div>
    <button class="restart-btn" id="restartBtn">다시 시작</button>
  </div>

</div>

// 배열로 변환
const WORDS = Object.entries(RAW)
  .filter(([k]) => k !== 'total_id')
  .map(([id, v]) => ({ id: parseInt(id), ...v }));

// ── 상태 ──
let queue = [];
let currentIdx = 0;
let sessionCorrect = 0;
let sessionWrong = 0;
let answered = false;
let wrongLog = []; // { mean, correct, mine }
let totalCorrect = parseInt(localStorage.getItem('tc') || '0');
let totalWrong   = parseInt(localStorage.getItem('tw') || '0');
let totalSessions= parseInt(localStorage.getItem('ts') || '0');

// ── DOM ──
const $ = id => document.getElementById(id);
const startBtn   = $('startBtn');
const quizArea   = $('quizArea');
const resultScreen = $('resultScreen');
const answerInput = $('answerInput');
const submitBtn  = $('submitBtn');
const nextBtn    = $('nextBtn');
const feedback   = $('feedback');

function updateGlobalStats() {
  $('totalCorrect').textContent = totalCorrect;
  $('totalWrong').textContent   = totalWrong;
  $('totalSessions').textContent= totalSessions;
}
updateGlobalStats();

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── 시작 ──
startBtn.addEventListener('click', () => {
  const count = Math.min(Math.max(parseInt($('countInput').value) || 20, 1), WORDS.length);
  const order = $('orderSelect').value;
  const pool  = order === 'random' ? shuffle(WORDS) : [...WORDS];
  queue = pool.slice(0, count);
  currentIdx = 0;
  sessionCorrect = 0;
  sessionWrong   = 0;
  wrongLog = [];
  answered = false;

  quizArea.style.display = 'block';
  resultScreen.classList.remove('show');
  document.querySelector('.config-panel').style.display = 'none';
  document.querySelector('.mode-tabs').style.display = 'none';

  loadQuestion();
});

function loadQuestion() {
  if (currentIdx >= queue.length) { showResult(); return; }
  const word = queue[currentIdx];
  answered = false;

  const card = $('quizCard');
  card.className = 'card';
  $('cardNum').textContent = `WORD #${String(word.id).padStart(3,'0')}`;
  $('questionText').textContent = word.mean;

  // 힌트: 글자 수
  const len = word.name.length;
  $('questionHint').textContent = `${len}글자`;

  answerInput.value = '';
  answerInput.className = 'answer-input';
  answerInput.disabled = false;
  submitBtn.disabled = false;
  feedback.className = 'feedback';
  feedback.textContent = '';
  nextBtn.className = 'next-btn';

  // 진행률
  const pct = (currentIdx / queue.length) * 100;
  $('progressFill').style.width = pct + '%';
  $('progressLabel').textContent = `${currentIdx} / ${queue.length}`;

  answerInput.focus();
}

function checkAnswer() {
  if (answered) return;
  const word = queue[currentIdx];
  const caseMode = $('caseSelect').value;
  let input = answerInput.value.trim();
  let correct = word.name;

  if (caseMode === 'ignore') {
    input   = input.toLowerCase();
    correct = correct.toLowerCase();
  }

  answered = true;
  answerInput.disabled = true;
  submitBtn.disabled = true;
  nextBtn.className = 'next-btn show';

  if (input === correct) {
    sessionCorrect++;
    totalCorrect++;
    answerInput.className = 'answer-input correct';
    $('quizCard').classList.add('correct-card');
    feedback.className = 'feedback correct show';
    feedback.textContent = '✓ 정답!';
  } else {
    sessionWrong++;
    totalWrong++;
    answerInput.className = 'answer-input wrong';
    $('quizCard').classList.add('wrong-card');
    $('quizCard').classList.add('shake');
    setTimeout(() => $('quizCard').classList.remove('shake'), 400);
    feedback.className = 'feedback wrong show';
    feedback.textContent = `✗ 오답 — 정답: ${word.name}`;
    wrongLog.push({ mean: word.mean, correct: word.name, mine: answerInput.value.trim() });
  }

  localStorage.setItem('tc', totalCorrect);
  localStorage.setItem('tw', totalWrong);
  updateGlobalStats();
}

submitBtn.addEventListener('click', checkAnswer);
answerInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (answered) { nextQuestion(); }
    else { checkAnswer(); }
  }
});

function nextQuestion() {
  currentIdx++;
  loadQuestion();
}
nextBtn.addEventListener('click', nextQuestion);

// ── 결과 ──
function showResult() {
  quizArea.style.display = 'none';
  resultScreen.classList.add('show');
  totalSessions++;
  localStorage.setItem('ts', totalSessions);
  updateGlobalStats();

  const pct = Math.round((sessionCorrect / queue.length) * 100);
  $('resultScore').textContent = pct + '%';
  $('resCorrect').textContent  = sessionCorrect;
  $('resWrong').textContent    = sessionWrong;
  $('resTotal').textContent    = queue.length;

  if (wrongLog.length > 0) {
    $('wrongList').style.display = 'block';
    $('wrongItems').innerHTML = wrongLog.map(w => `
      <div class="wrong-item">
        <span class="korean">${w.mean}</span>
        <span class="answer">${w.correct}</span>
        <span class="my-answer">내 답: ${w.mine || '(없음)'}</span>
      </div>
    `).join('');
  } else {
    $('wrongList').style.display = 'none';
  }
}

$('restartBtn').addEventListener('click', () => {
  resultScreen.classList.remove('show');
  document.querySelector('.config-panel').style.display = 'flex';
  document.querySelector('.mode-tabs').style.display = 'flex';
  $('progressFill').style.width = '0%';
  $('progressLabel').textContent = '0 / 0';
});
</script>
</body>
